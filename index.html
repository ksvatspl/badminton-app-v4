<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro (V6.1.5 - New Server)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            --live: #5865f2;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .page-header { position: sticky; top: 0; background-color: var(--bg-body); z-index: 100; padding: 15px; border-bottom: 1px solid var(--border); height: 60px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; }
        .page-header h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin: 0; font-size: 1.1rem; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; } .page.active { display: block; }
        
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; border-left: 4px solid transparent; transition: border 0.3s; }
        .card.is-live { border-left-color: var(--live); }
        .card.is-saved { border-left-color: var(--accent); }
        .card.hidden-match { display: none !important; }
        
        .status-badge { position: absolute; top: -8px; left: 15px; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-live { background: var(--live); color: white; }
        .badge-saved { background: var(--accent); color: white; }

        .game-label { position: absolute; top: -10px; right: 20px; background: #202225; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-item { background: #36393f; padding: 12px 5px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .dash-val { display: block; font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        .dash-label { font-size: 0.65rem; color: var(--text-dim); }

        .txt-p { color: var(--cls-p) !important; } .txt-s { color: var(--cls-s) !important; } 
        .txt-n { color: var(--cls-n) !important; } .txt-bg { color: var(--cls-bg) !important; } 
        .txt-bb { color: var(--cls-bb) !important; }
        
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 8px; border-left: 5px solid transparent; border-right: 1px solid var(--border); }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #4f545c; opacity: 0.6; cursor: not-allowed; }
        
        .action-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-suggest { flex: 0 0 55px; background: var(--warning); color: #000; border: none; border-radius: 10px; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; }
        
        .btn-live-act { background: var(--live); }
        .btn-add-manual { width: 100%; padding: 15px; background: transparent; border: 2px dashed var(--border); color: var(--text-dim); border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .btn-status { border: none; border-radius: 6px; padding: 6px 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-out { background: rgba(240, 71, 71, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-in { background: rgba(67, 181, 129, 0.15); color: var(--accent); border: 1px solid var(--accent); }
        
        .header-btns { display: flex; gap: 8px; }
        .btn-mini { background: #5865f2; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-choice { flex: 1; padding: 10px; background: #36393f; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-choice.selected { background: rgba(67, 181, 129, 0.2); border-color: var(--accent); color: var(--accent); }
        
        .btn-saved-compact { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); padding: 8px; font-size: 0.85rem; border-radius: 8px; width: 100%; text-align: center; margin-top: 5px; font-weight: bold; }
        .btn-edit-link { background: transparent; border: none; color: var(--warning); font-size: 0.75rem; text-decoration: underline; margin-top: 8px; display: none; width: 100%; cursor: pointer; }
        
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table th { color: var(--text-dim); font-size: 0.65rem; padding: 10px 4px; border-bottom: 1px solid var(--border); text-align: center; cursor: pointer; }
        .m-table td { padding: 12px 4px; border-bottom: 1px solid #36393f; font-size: 0.85rem; text-align: center; vertical-align: middle; }
        
        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .dot-active { background: var(--accent); } .dot-off { background: var(--danger); }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; margin-top: 5px; }
        .vs-text { color: var(--danger); font-weight: bold; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 200; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="page-header"><h2>👥 จัดการผู้เล่น</h2></div>
    <div class="container">
        <div class="card" id="memberFormCard">
            <input type="hidden" id="edit_mem_id">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class">
                <option value="P">P</option><option value="S+">S+</option><option value="S">S</option><option value="N+">N+</option><option value="N">N</option><option value="BG+">BG+</option><option value="BG">BG</option><option value="BB+">BB+</option><option value="BB">BB</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ (เช่น ลำดับทีม)">
            <div id="formActions">
                <button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>
            </div>
        </div>
        <div class="card" style="padding: 5px;">
            <table class="m-table">
                <thead id="memberListHead"></thead>
                <tbody id="memberListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header">
        <h2>🏸 จดผล</h2>
        <div class="header-btns">
            <button id="toggleHideBtn" onclick="toggleHideSaved()" class="btn-mini">👁️ ซ่อนที่จบแล้ว</button>
            <button onclick="openStats()" class="btn-mini">📊 สถิติ</button>
        </div>
    </div>
    <div class="container">
        <div id="matchContainer"></div>
        <button class="btn-add-manual" onclick="addNewManualBox()">+ เพิ่มเกมใหม่ (Manual)</button>
    </div>
</div>

<div id="page3" class="page">
    <div class="page-header"><h2>⚙️ ตั้งค่า</h2></div>
    <div class="container">
        <div class="dash-grid">
            <div class="dash-item"><span class="dash-val" id="stat-matches">0</span><span class="dash-label">แมตช์</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-active">0</span><span class="dash-label">เล่นอยู่</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-total">0</span><span class="dash-label">ทั้งหมด</span></div>
        </div>
        <div class="card" style="text-align: center;">
            <button class="btn-main" style="background:var(--warning); color:#000; margin-bottom:15px;" onclick="openDeleteModal('matches')">🗑️ ล้างแมตช์</button>
            <button class="btn-main" style="background:var(--danger);" onclick="openDeleteModal('members')">🗑️ ลบสมาชิกทั้งหมด</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
    <div class="nav-item" onclick="showPage(3)">ตั้งค่า</div>
</nav>

<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-height: 300px; width: 85%;">
        <div class="modal-body" style="text-align: center; padding: 20px;">
            <h3 style="color:var(--danger);">⚠️ ยืนยันการลบ</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem;">พิมพ์ <strong>delete</strong> เพื่อล้างข้อมูล</p>
            <input type="text" id="deleteConfirmInput" onkeyup="checkDeleteInput()" style="text-align: center;">
            <button class="btn-main" id="btnConfirmDelete" onclick="executeDelete()" disabled style="background:var(--danger); margin-bottom:10px;">ยืนยันลบ</button>
            <button class="btn-main" style="background:#4f545c;" onclick="closeDeleteModal()">ยกเลิก</button>
        </div>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; color:var(--accent);">📊 สถิติเกม</h3>
            <span style="font-size: 24px; cursor: pointer; color: var(--text-dim);" onclick="closeStats()">&times;</span>
        </div>
        <div style="overflow-y: auto; padding: 10px;">
            <table class="m-table">
                <thead id="statsListHead"></thead>
                <tbody id="miniStatsTableBody"></tbody>
            </table>
        </div>
        <div style="padding: 10px;"><button class="btn-main" onclick="closeStats()">ปิด</button></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD2zW91rpHmZr6-_Bm4SlaAiyDjqvPgjuo",
        authDomain: "badminton-hub-v4.firebaseapp.com",
        projectId: "badminton-hub-v4",
        storageBucket: "badminton-hub-v4.firebasestorage.app",
        messagingSenderId: "249281662199",
        appId: "1:249281662199:web:41ff375ef86c5d6fec97f2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.allDataMemory = [];
    window.fireMembers = [];
    window.fireMatches = [];
    window.hideSavedMatches = false;
    window.currentSort = { key: 'TotalPlayed', direction: 'desc' };
    window.globalNextMatchNum = 1;

    // Listeners
    onSnapshot(collection(db, "members"), (snapshot) => {
        window.fireMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
    });

    onSnapshot(query(collection(db, "matches"), orderBy("timestamp", "asc")), (snapshot) => {
        window.fireMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
        if(document.getElementById('page2').classList.contains('active')) renderMatchHistoryStrict();
    });

    function calculateStats() {
        let statsMap = {};
        window.fireMembers.forEach(m => { 
            statsMap[m.name] = { id: m.id, Name: m.name, Class: m.class, Note: m.note || "", Status: m.status, TotalPlayed: 0, Win: 0, Loss: 0, WinRate: 0 }; 
        });
        window.fireMatches.forEach(m => {
            if(m.matchStatus !== 'saved') return;
            const update = (p, isWin) => { if(p && statsMap[p]) { statsMap[p].TotalPlayed++; if(isWin) statsMap[p].Win++; else statsMap[p].Loss++; } };
            if(m.winner === 'Team A') { update(m.p1a, true); update(m.p2a, true); update(m.p1b, false); update(m.p2b, false); }
            else if(m.winner === 'Team B') { update(m.p1a, false); update(m.p2a, false); update(m.p1b, true); update(m.p2b, true); }
        });
        window.allDataMemory = Object.values(statsMap).map(m => {
            m.WinRate = m.TotalPlayed > 0 ? Math.round((m.Win/m.TotalPlayed)*100) : 0;
            return m;
        });
        renderMemberList(); updateDash();
    }

    window.registerMember = async function() {
        const n = document.getElementById('mem_name'), c = document.getElementById('mem_class'), nt = document.getElementById('mem_note');
        if(!n.value.trim()) return;
        await addDoc(collection(db, "members"), { name: n.value.trim(), class: c.value, note: nt.value, status: "Active" });
        n.value = ""; nt.value = "";
    };

    window.updateMemberData = async function() {
        const id = document.getElementById('edit_mem_id').value;
        const n = document.getElementById('mem_name').value.trim();
        const c = document.getElementById('mem_class').value;
        const nt = document.getElementById('mem_note').value;
        if(!id || !n) return;
        await updateDoc(doc(db, "members", id), { name: n, class: c, note: nt });
        cancelEditMember();
    };

    window.saveMatchBox = async function(matchNum, status = 'saved') {
        const box = document.querySelector(`.card[data-matchnum="${matchNum}"]`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        const players = Array.from(box.querySelectorAll('.p-select')).map(s => s.value);
        if(status === 'live' && players.filter(p => p !== "").length < 4) return alert("เลือกผู้เล่นให้ครบ 4 คน!");
        if(status === 'saved' && (!winner || players.includes(""))) return alert("ระบุผู้ชนะและผู้เล่นให้ครบ!");
        
        delete box.dataset.editing;
        const data = { matchNum: parseInt(matchNum), p1a: players[0], p2a: players[1], p1b: players[2], p2b: players[3], winner: winner || null, matchStatus: status, timestamp: serverTimestamp() };
        if(box.dataset.docid) await updateDoc(doc(db, "matches", box.dataset.docid), data);
        else await addDoc(collection(db, "matches"), data);
    };

    window.quickStatusUpdate = async function(name, action) {
        const m = window.fireMembers.find(i => i.name === name);
        if(m) await updateDoc(doc(db, "members", m.id), { status: action === "checkout" ? "Inactive" : "Active" });
    };

    window.openDeleteModal = (target) => { window.deleteTarget = target; document.getElementById('deleteModal').style.display = 'flex'; };
    window.closeDeleteModal = () => { document.getElementById('deleteModal').style.display = 'none'; document.getElementById('deleteConfirmInput').value = ''; };
    window.checkDeleteInput = () => { document.getElementById('btnConfirmDelete').disabled = document.getElementById('deleteConfirmInput').value.toLowerCase() !== 'delete'; };
    
    window.executeDelete = async function() {
        const snapshot = await getDocs(collection(db, window.deleteTarget));
        await Promise.all(snapshot.docs.map(d => deleteDoc(doc(db, window.deleteTarget, d.id))));
        closeDeleteModal();
    };
</script>

<script>
    window.showPage = (p) => { 
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); 
        document.getElementById('page'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach((nv, i) => nv.classList.toggle('active', i+1 === p));
        if(p === 2) renderMatchHistoryStrict();
        window.scrollTo(0,0);
    };

    window.getClassValue = (cls) => {
        const valMap = { 'P': 9, 'S+': 8, 'S': 7, 'N+': 6, 'N': 5, 'BG+': 4, 'BG': 3, 'BB+': 2, 'BB': 1 };
        return valMap[cls?.toUpperCase()] || 0;
    };

    window.renderMatchHistoryStrict = () => {
        const container = document.getElementById('matchContainer');
        const scrollPos = window.scrollY;
        let highestNum = 0;
        container.querySelectorAll('.card').forEach(c => { if (c.dataset.status !== 'draft' && c.dataset.editing !== "true") c.remove(); });
        
        window.fireMatches.forEach((m) => {
            highestNum = Math.max(highestNum, m.matchNum);
            let box = createMatchElement(m.matchNum);
            container.appendChild(box);
            box.dataset.docid = m.id;
            box.dataset.status = m.matchStatus;
            box.classList.toggle('is-live', m.matchStatus === 'live');
            box.classList.toggle('is-saved', m.matchStatus === 'saved');
            if(window.hideSavedMatches && m.matchStatus === 'saved') box.classList.add('hidden-match');
            
            const badge = document.createElement('span');
            badge.className = `status-badge ${m.matchStatus === 'live' ? 'badge-live' : 'badge-saved'}`;
            badge.innerText = m.matchStatus === 'live' ? 'กำลังแข่ง 🎾' : 'บันทึกแล้ว ✅';
            box.appendChild(badge);

            const selects = box.querySelectorAll('.p-select'), players = [m.p1a, m.p2a, m.p1b, m.p2b];
            selects.forEach((sel, i) => {
                sel.innerHTML = `<option value="${players[i]}">${players[i] || ''}</option>`;
                sel.value = players[i]; sel.disabled = true;
                applyColorManual(sel, players[i]);
            });

            const btnGroup = box.querySelector('.btn-group');
            btnGroup.dataset.winner = m.winner || "";
            btnGroup.querySelectorAll('.btn-choice').forEach(b => {
                const isWinner = (m.winner === 'Team A' && b.innerText.includes('A')) || (m.winner === 'Team B' && b.innerText.includes('B'));
                if(isWinner) b.classList.add('selected');
                b.disabled = (m.matchStatus === 'saved'); 
            });

            if(m.matchStatus === 'live') {
                box.querySelector('.btn-main.btn-live-act').innerText = '💾 บันทึกผลการแข่ง';
                box.querySelector('.btn-main.btn-live-act').onclick = () => saveMatchBox(m.matchNum, 'saved');
                box.querySelector('.btn-suggest').style.display = 'none';
            } else {
                box.querySelector('.action-row').style.display = 'none';
                const sd = document.createElement('div'); sd.className = 'btn-saved-compact';
                sd.innerText = '✓ บันทึกผลแล้ว'; box.insertBefore(sd, box.querySelector('.btn-edit-link'));
            }
            box.querySelector('.btn-edit-link').style.display = 'block';
        });
        window.globalNextMatchNum = Math.max(highestNum + 1, window.globalNextMatchNum);
        window.scrollTo(0, scrollPos);
    };

    window.addNewManualBox = () => {
        const container = document.getElementById('matchContainer');
        const box = createMatchElement(window.globalNextMatchNum++);
        container.appendChild(box);
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.createMatchElement = (num) => {
        const div = document.createElement('div'); div.className = 'card'; div.dataset.matchnum = num; div.dataset.status = 'draft';
        div.innerHTML = `
            <div class="game-label">เกมที่ ${num}</div>
            <div class="match-grid">
                <div><select class="p-select" data-role="p1a" onchange="handleSel(this)"></select><select class="p-select" data-role="p2a" onchange="handleSel(this)"></select></div>
                <div class="vs-text">VS</div>
                <div><select class="p-select" data-role="p1b" onchange="handleSel(this)"></select><select class="p-select" data-role="p2b" onchange="handleSel(this)"></select></div>
            </div>
            <div class="btn-group">
                <button class="btn-choice" onclick="setWin(this,'Team A')">A ชนะ</button>
                <button class="btn-choice" onclick="setWin(this,'Team B')">B ชนะ</button>
            </div>
            <div class="action-row">
                <button class="btn-suggest" onclick="autoSuggestPlayers(${num})">🤖</button>
                <button class="btn-main btn-live-act" onclick="saveMatchBox(${num}, 'live')">▶ ลงสนาม (ล็อคชื่อ)</button>
            </div>
            <button class="btn-edit-link" onclick="editMatch(${num})">แก้ไขข้อมูล</button>`;
        return div;
    };

    window.editMatch = (num) => {
        const box = document.querySelector(`.card[data-matchnum="${num}"]`);
        box.dataset.editing = "true";
        box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = false);
        if(box.querySelector('.btn-saved-compact')) box.querySelector('.btn-saved-compact').remove();
        box.querySelector('.action-row').style.display = 'flex';
        box.querySelector('.btn-suggest').style.display = 'flex';
        box.querySelector('.btn-main.btn-live-act').innerText = '💾 ยืนยันแก้ไข/ลงสนาม';
        box.querySelector('.btn-main.btn-live-act').onclick = () => saveMatchBox(num, 'live');
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.autoSuggestPlayers = (num) => {
        const box = document.querySelector(`.card[data-matchnum="${num}"]`);
        let excluded = [];
        document.querySelectorAll('.card').forEach(card => {
            if (card.dataset.status === 'live' || card.dataset.editing === "true") {
                card.querySelectorAll('.p-select').forEach(sel => { if(sel.value) excluded.push(sel.value); });
            }
        });
        let available = window.allDataMemory.filter(m => m.Status === "Active" && !excluded.includes(m.Name));
        if (available.length < 4) return alert("ผู้เล่นว่างไม่พอ!");
        available.sort((a,b) => a.TotalPlayed - b.TotalPlayed);
        const best = available.slice(0, 4);
        const selects = box.querySelectorAll('.p-select');
        best.forEach((p, i) => { selects[i].value = p.Name; applyColorManual(selects[i], p.Name); });
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.refreshSelectOptionsManual = (selectEl) => {
        const curVal = selectEl.value, box = selectEl.closest('.card'), role = selectEl.dataset.role;
        const allSelected = Array.from(box.querySelectorAll('.p-select')).map(s => s.value).filter(v => v !== "" && v !== curVal);
        
        let partnerRole = (role === 'p1a') ? 'p2a' : (role === 'p2a') ? 'p1a' : (role === 'p1b') ? 'p2b' : 'p1b';
        let partnerVal = box.querySelector(`[data-role="${partnerRole}"]`).value;

        selectEl.innerHTML = '<option value="">- เลือก -</option>';
        window.allDataMemory.filter(m => m.Status === "Active")
        .sort((a, b) => window.getClassValue(b.Class) - window.getClassValue(a.Class))
        .forEach(m => {
            if(allSelected.includes(m.Name)) return;
            let text = `${window.getDotEmoji(m.Class)} ${m.Name} [${m.Class}]`;
            if(partnerVal && m.Name !== partnerVal) {
                const pc = window.getPartnerCount(m.Name, partnerVal);
                if(pc > 0) text += ` 🤝${pc > 1 ? '×'+pc : ''}`;
            }
            selectEl.appendChild(new Option(text, m.Name));
        });
        selectEl.value = curVal;
    };

    window.getDotEmoji = (cls) => {
        const c = cls?.toUpperCase() || "";
        if(c.includes('P')) return "🟣"; if(c.includes('S')) return "🔴"; if(c.includes('N')) return "🟠"; if(c.includes('BG')) return "🔵"; return "🟢";
    };

    window.getTxtClass = (cls) => {
        const c = cls?.toUpperCase() || "";
        if(c.includes('P')) return "txt-p"; if(c.includes('S')) return "txt-s"; if(c.includes('N')) return "txt-n"; if(c.includes('BG')) return "txt-bg"; return "txt-bb";
    };

    window.getPartnerCount = (p1, p2) => {
        let count = 0;
        window.fireMatches.forEach(m => {
            if(((m.p1a===p1 && m.p2a===p2) || (m.p1a===p2 && m.p2a===p1)) || ((m.p1b===p1 && m.p2b===p2) || (m.p1b===p2 && m.p2b===p1))) count++;
        });
        return count;
    };

    window.applyColorManual = (el, name) => {
        const m = window.allDataMemory.find(i => i.Name === name);
        el.style.borderLeftColor = m ? `var(--cls-${window.getTxtClass(m.Class).split('-')[1]})` : 'transparent';
    };

    window.handleSel = (el) => { 
        applyColorManual(el, el.value);
        el.closest('.card').querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s)); 
    };

    window.setWin = (btn, team) => {
        btn.parentElement.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); btn.parentElement.dataset.winner = team;
    };

    window.renderMemberList = () => {
        const head = document.getElementById('memberListHead'), body = document.getElementById('memberListBody');
        const arrow = window.currentSort.direction === 'asc' ? '↑' : '↓';
        head.innerHTML = `<tr><th onclick="setSort('Name')">ชื่อ/คลาส ${window.currentSort.key==='Name'?arrow:''}</th><th onclick="setSort('TotalPlayed')">เกม ${window.currentSort.key==='TotalPlayed'?arrow:''}</th><th onclick="setSort('WinRate')">Win% ${window.currentSort.key==='WinRate'?arrow:''}</th><th>แก้ไข</th><th>เข้า/ออก</th></tr>`;
        let html = "";
        window.getSortedData().forEach(m => {
            const isActive = m.Status === "Active";
            html += `<tr><td><div style="display:flex; flex-direction:column; line-height:1.2; text-align:left; padding-left:10px;"><span><span class="status-dot ${isActive?'dot-active':'dot-off'}"></span><b>${m.Name}</b> <small class="${window.getTxtClass(m.Class)}">[${m.Class}]</small></span><span style="font-size:0.7rem; color:#72767d;">${m.Note}</span></div></td><td><b>${m.TotalPlayed}</b></td><td>${m.WinRate}%</td><td><button style="color:var(--warning); background:none; border:none; text-decoration:underline;" onclick="editMember('${m.id}')">แก้ไข</button></td><td><button class="btn-status ${isActive?'btn-out':'btn-in'}" onclick="quickStatusUpdate('${m.Name}','${isActive?'checkout':'undo'}')">${isActive?'ออก':'เข้า'}</button></td></tr>`;
        });
        body.innerHTML = html;
    };

    window.editMember = (id) => {
        const m = window.fireMembers.find(i => i.id === id);
        if(!m) return;
        document.getElementById('edit_mem_id').value = m.id;
        document.getElementById('mem_name').value = m.name;
        document.getElementById('mem_class').value = m.class;
        document.getElementById('mem_note').value = m.note || "";
        document.getElementById('formActions').innerHTML = `<div style="display:flex; gap:10px;"><button class="btn-main" onclick="updateMemberData()" style="background:var(--warning); color:#000;">💾 อัปเดต</button><button class="btn-main" onclick="cancelEditMember()" style="background:#4f545c;">ยกเลิก</button></div>`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.cancelEditMember = () => {
        document.getElementById('edit_mem_id').value = ""; document.getElementById('mem_name').value = ""; document.getElementById('mem_note').value = "";
        document.getElementById('formActions').innerHTML = `<button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>`;
    };

    window.setSort = (key) => {
        if (window.currentSort.key === key) window.currentSort.direction = window.currentSort.direction === 'asc' ? 'desc' : 'asc';
        else { window.currentSort.key = key; window.currentSort.direction = 'desc'; }
        renderMemberList();
    };

    window.getSortedData = () => {
        return [...window.allDataMemory].sort((a, b) => {
            if (a.Status !== b.Status) return a.Status === "Active" ? -1 : 1;
            let valA = a[window.currentSort.key], valB = b[window.currentSort.key];
            if (typeof valA === 'string') return window.currentSort.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return window.currentSort.direction === 'asc' ? valA - valB : valB - valA;
        });
    };

    window.updateDash = () => {
        document.getElementById('stat-matches').innerText = window.fireMatches.filter(m => m.matchStatus === 'saved').length;
        document.getElementById('stat-active').innerText = window.fireMembers.filter(m => m.status === 'Active').length;
        document.getElementById('stat-total').innerText = window.fireMembers.length;
    };

    window.toggleHideSaved = () => {
        window.hideSavedMatches = !window.hideSavedMatches;
        document.getElementById('toggleHideBtn').innerText = window.hideSavedMatches ? '👁️ แสดงทั้งหมด' : '👁️ ซ่อนที่จบแล้ว';
        renderMatchHistoryStrict();
    };

    window.openStats = () => {
        const body = document.getElementById('miniStatsTableBody');
        const head = document.getElementById('statsListHead');
        const arrow = window.currentSort.direction === 'asc' ? '↑' : '↓';
        head.innerHTML = `<tr><th onclick="setSort('Name')">ชื่อ ${window.currentSort.key==='Name'?arrow:''}</th><th onclick="setSort('TotalPlayed')">เล่น ${window.currentSort.key==='TotalPlayed'?arrow:''}</th><th onclick="setSort('Win')">ชนะ ${window.currentSort.key==='Win'?arrow:''}</th><th onclick="setSort('WinRate')">WR% ${window.currentSort.key==='WinRate'?arrow:''}</th></tr>`;
        body.innerHTML = window.getSortedData().map(m => `<tr><td><b>${m.Name}</b></td><td>${m.TotalPlayed}</td><td>${m.Win}</td><td>${m.WinRate}%</td></tr>`).join('');
        document.getElementById('statsModal').style.display = 'flex';
    };
    window.closeStats = () => document.getElementById('statsModal').style.display = 'none';

</script>
</body>
</html>
